name: Sync Docker Images

on:
  repository_dispatch:
    types: [sync-image, sync-all]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Sync image
        run: |
          # 从事件负载中获取同步信息
          SOURCE_IMAGE="${{ github.event.client_payload.source_image }}"
          TARGET_IMAGE="${{ github.event.client_payload.target_image }}"
          TAGS="${{ github.event.client_payload.tags }}"
          
          # 遍历标签并同步
          IFS=',' read -ra TAG_ARRAY <<< "$TAGS"
          for TAG in "${TAG_ARRAY[@]}"; do
            echo "Syncing $SOURCE_IMAGE:$TAG to ghcr.io/${{ github.repository_owner }}/$TARGET_IMAGE:$TAG"
            docker pull "$SOURCE_IMAGE:$TAG"
            docker tag "$SOURCE_IMAGE:$TAG" "ghcr.io/${{ github.repository_owner }}/$TARGET_IMAGE:$TAG"
            docker push "ghcr.io/${{ github.repository_owner }}/$TARGET_IMAGE:$TAG"
          done
