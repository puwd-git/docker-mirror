name: Docker Image Sync

on:
  schedule:
    - cron: '0 */6 * * *'  # 每 6 小时同步一次
  workflow_dispatch:  # 允许手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync images
        run: |
          # 镜像列表（可根据需要修改）
          IMAGES=(
            "nginx:latest"
            "nginx:1.25-alpine"
            "redis:7.2"
            "redis:7-alpine"
            "postgres:16"
            "postgres:15"
            "mysql:8.0"
            "mysql:5.7"
            "node:20-alpine"
            "node:18-alpine"
            "python:3.12-slim"
            "python:3.11-slim"
            "golang:1.21"
            "alpine:3.19"
            "ubuntu:22.04"
          )
          
          for IMAGE in "${IMAGES[@]}"; do
            echo "🔄 Syncing $IMAGE..."
            # 拉取镜像
            docker pull $IMAGE
            # 构建新标签
            NEW_TAG=ghcr.io/${{ github.repository_owner }}/docker-mirror/$(echo $IMAGE | sed 's#/#-#g')
            docker tag $IMAGE $NEW_TAG
            # 推送镜像
            docker push $NEW_TAG
            echo "✅ Synced $IMAGE to $NEW_TAG"
          done
